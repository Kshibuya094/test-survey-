<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アンケート回答状況管理</title>
    
    <script src="https://res.cdn.office.net/teams-js/2/latest/js/MicrosoftTeams.min.js"></script>

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f3f4f6; color: #333; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 24px; margin-bottom: 25px; color: #111827; text-align: center; }
       
        .input-group { display: flex; gap: 15px; margin-bottom: 30px; align-items: center; background: #f9fafb; padding: 15px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .input-box { flex: 2; display: flex; flex-direction: column; gap: 5px; }
        .date-box { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 13px; font-weight: bold; color: #4b5563; }
       
        input[type="text"], input[type="date"] { 
            padding: 11px; border: 1px solid #d1d5db; border-radius: 6px; 
            font-size: 15px; width: 100%; box-sizing: border-box; 
        }
       
        .add-btn { 
            padding: 12px 28px; background-color: #2563eb; color: white; 
            border: none; border-radius: 6px; font-size: 16px; cursor: pointer; 
            font-weight: bold; transition: background 0.2s; align-self: flex-end; 
        }
        .add-btn:hover { background-color: #1d4ed8; }
       
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 14px; text-align: center; border-bottom: 1px solid #e5e7eb; }
        th { background-color: #f9fafb; color: #4b5563; font-weight: 600; }
        .survey-name { text-align: left; font-weight: bold; color: #374151; }
        .survey-deadline { color: #6b7280; font-size: 14px; white-space: nowrap; }
       
        .status-btn { 
            padding: 8px 16px; border: none; border-radius: 20px; 
            font-size: 14px; font-weight: 500; cursor: pointer; 
            transition: all 0.2s; width: 95px; 
            pointer-events: auto !important;
        }
        .status-btn.unanswered { background-color: #fee2e2; color: #ef4444; }
        .status-btn.unanswered::before { content: "未回答"; }
        .status-btn.answered { background-color: #dcfce7; color: #22c55e; }
        .status-btn.answered::before { content: "回答済"; }
       
        .delete-btn { 
            background-color: #ef4444; padding: 8px 12px; font-size: 14px; 
            border: none; border-radius: 6px; color: white; cursor: pointer; 
            pointer-events: auto !important;
        }
        .delete-btn:hover { background-color: #dc2626; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 アンケート回答状況チェック</h1>
    <div class="input-group">
        <div class="input-box">
            <label for="newSurveyName">アンケート名</label>
            <input type="text" id="newSurveyName" placeholder="例: 6月度満足度調査">
        </div>
        <div class="date-box">
            <label for="newSurveyDeadline">締切日</label>
            <input type="date" id="newSurveyDeadline">
        </div>
        <button class="add-btn" id="addButton">追加</button>
    </div>
    <table id="managerTable">
        <thead>
            <tr>
                <th style="text-align: left;">アンケート名</th>
                <th>締切</th>
                <th>飯嶋さん</th>
                <th>谷田さん</th>
                <th>本田さん</th>
                <th>徳石さん</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    async function initTeams() {
        try {
            await microsoftTeams.app.initialize();
            console.log("Teams SDK 初期化");
        } catch(e) {}
    }

    let surveyData = JSON.parse(localStorage.getItem('survey_app_data')) || [
        { name: 'サンプルアンケート（テスト用）', deadline: '2026-06-30', users: [false, false, false, false] }
    ];

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        surveyData.forEach((row, rowIndex) => {
            const tr = document.createElement('tr');
            
            const tdName = document.createElement('td');
            tdName.className = 'survey-name';
            tdName.textContent = row.name;
            tr.appendChild(tdName);

            const tdDeadline = document.createElement('td');
            tdDeadline.className = 'survey-deadline';
            tdDeadline.textContent = row.deadline ? `${new Date(row.deadline).getMonth()+1}/${new Date(row.deadline).getDate()}` : '-';
            tr.appendChild(tdDeadline);

            row.users.forEach((status, userIndex) => {
                const td = document.createElement('td');
                const btn = document.createElement('button');
                btn.className = `status-btn ${status ? 'answered' : 'unanswered'}`;
                btn.dataset.row = rowIndex;
                btn.dataset.user = userIndex;
                td.appendChild(btn);
                tr.appendChild(td);
            });

            const tdDel = document.createElement('td');
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '削除';
            delBtn.dataset.row = rowIndex;
            tdDel.appendChild(delBtn);
            tr.appendChild(tdDel);

            tbody.appendChild(tr);
        });

        localStorage.setItem('survey_app_data', JSON.stringify(surveyData));
    }

    // イベント委譲（Teams対応）
    document.addEventListener('click', function(e) {
        if (e.target.id === 'addButton') {
            addSurveyRow();
        } else if (e.target.classList.contains('status-btn')) {
            const row = parseInt(e.target.dataset.row);
            const user = parseInt(e.target.dataset.user);
            if (!isNaN(row) && !isNaN(user)) {
                surveyData[row].users[user] = !surveyData[row].users[user];
                renderTable();
            }
        } else if (e.target.classList.contains('delete-btn')) {
            const row = parseInt(e.target.dataset.row);
            if (!isNaN(row) && confirm('このアンケートを削除しますか？')) {
                surveyData.splice(row, 1);
                renderTable();
            }
        }
    });

    function addSurveyRow() {
        const name = document.getElementById('newSurveyName').value.trim();
        const deadline = document.getElementById('newSurveyDeadline').value;
        if (!name) return alert('アンケート名を入力してください');
        
        surveyData.unshift({ name, deadline, users: [false, false, false, false] });
        document.getElementById('newSurveyName').value = '';
        document.getElementById('newSurveyDeadline').value = '';
        renderTable();
    }

    window.onload = async () => {
        await initTeams();
        renderTable();
    };
</script>
</body>
</html>
